<meta charset="UTF-8">

<style>
:root{
    --primary:#0d6efd;
    --secondary:#6c757d;
    --radius-card:8px;
    --radius-btn:4px;
    --gap:8px;
    --font-family:"Helvetica Neue",Arial,sans-serif;
}
body{
    margin:0;
    font-family:var(--font-family);
    background:#f8f9fa;
    padding-top:56px; /*导航高度*/
}
.container{
    max-width:1200px;
    margin:auto;
    padding:var(--gap);
    display:flex;
    flex-wrap:wrap;
    gap:var(--gap);
}
.breadcrumb{
    width:100%;
    margin-bottom:calc(var(--gap)*2);
}
.breadcrumb a{
    display:inline-block;
    padding:0.4em 0.8em;
    background:var(--primary);
    color:#fff;
    border:none;
    border-radius:var(--radius-btn);
    text-decoration:none;
    font-size:0.9rem;
    transition:background .2s;
}
.breadcrumb a:hover{
    background:#0b5ed7;
}
.card{
    background:#fff;
    border-radius:var(--radius-card);
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
    padding:calc(var(--gap)*2);
    flex:1 1 300px;
}
h2{margin-top:0;color:#333;}
p{color:#555;line-height:1.5;}
.btn{
    display:inline-block;
    padding:0.4em 0.8em;
    background:var(--primary);
    color:#fff;
    border:none;
    border-radius:var(--radius-btn);
    cursor:pointer;
    text-decoration:none;
    font-size:0.9rem;
    transition:background .2s;
    margin-right:var(--gap);
}
.btn:hover{
    background:#0b5ed7;
}
.input-group{
    margin-bottom:var(--gap);
}
.input-group label{
    display:block;
    margin-bottom:4px;
    font-size:0.9rem;
    color:#333;
}
.input-group input{
    width:100%;
    padding:0.4em;
    border:1px solid #ccc;
    border-radius:var(--radius-btn);
}
#quotaBar{
    width:100%;
    height:10px;
    background:#e9ecef;
    border-radius:5px;
    overflow:hidden;
    margin-top:4px;
}
#quotaFill{
    height:100%;
    background:var(--primary);
    width:0%;
}
@media (max-width:600px){
    .container{flex-direction:column;}
}
</style>

<body>
<div class="container">
    <nav class="breadcrumb">
        <a href="dashboard.html">返回仪表盘</a>
    </nav>
    <div class="card">
        <h2>账户信息</h2>
        <p id="userInfo">加载中...</p>
    </div>
    <div class="card">
        <h2>存储配额</h2>
        <p id="quotaInfo">加载中...</p>
        <div id="quotaBar"><div id="quotaFill"></div></div>
    </div>
    <div class="card">
        <h2>修改密码</h2>
        <div class="input-group">
            <label for="oldPwd">旧密码</label>
            <input type="password" id="oldPwd">
        </div>
        <div class="input-group">
            <label for="newPwd">新密码</label>
            <input type="password" id="newPwd">
        </div>
        <div class="input-group">
            <label for="confirmPwd">确认新密码</label>
            <input type="password" id="confirmPwd">
        </div>
        <button class="btn" id="changePwdBtn">提交</button>
        <p id="pwdMsg"></p>
    </div>
    <div class="card">
        <h2>退出登录</h2>
        <button class="btn" id="logoutBtn">退出登录</button>
    </div>
</div>
<script>
(function(){
    const token=localStorage.getItem('token');
    if(!token){window.location.href='login.html';return;}
    const user=JSON.parse(localStorage.getItem('user')||'{}');
    const models=JSON.parse(localStorage.getItem('models')||'{}');
    const used=Object.values(models).reduce((s,m)=>s+(m.size||0),0);
    const quota=10*1024*1024; //10MB
    const usedMB=used/1024/1024;
    const quotaMB=quota/1024/1024;
    document.getElementById('userInfo').textContent=`邮箱：${user.email||'未设置'}`;
    document.getElementById('quotaInfo').textContent=`已使用 ${usedMB.toFixed(2)} MB / ${quotaMB.toFixed(2)} MB`;
    const pct=Math.min(100,used/ quota*100);
    document.getElementById('quotaFill').style.width=pct+'%';
    document.getElementById('changePwdBtn').onclick=function(){
        const old=document.getElementById('oldPwd').value;
        const newp=document.getElementById('newPwd').value;
        const conf=document.getElementById('confirmPwd').value;
        const msg=document.getElementById('pwdMsg');
        if(old!==user.password){msg.textContent='旧密码错误';return;}
        if(newp!==conf){msg.textContent='两次新密码不一致';return;}
        if(newp.length<6){msg.textContent='密码至少6位';return;}
        user.password=newp;
        localStorage.setItem('user',JSON.stringify(user));
        msg.textContent='密码已更新';
    };
    document.getElementById('logoutBtn').onclick=function(){
        localStorage.removeItem('token');
        window.location.href='index.html';
    };
})();
</script>
