<script>
(() => {
    // 简易的本地“后端”模拟
    const STORAGE_KEY = 'webgl3d_user';
    const DEFAULT_USER = {
        email: 'user@example.com',
        name: '示例用户',
        usedQuota: 45, // MB
        totalQuota: 100, // MB
        password: 'Passw0rd!' // 明文仅演示，请勿在生产使用
    };

    // 初始化本地数据（若不存在）
    if (!localStorage.getItem(STORAGE_KEY)) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(DEFAULT_USER));
    }

    const getUser = () => JSON.parse(localStorage.getItem(STORAGE_KEY));

    const setUser = (data) => localStorage.setItem(STORAGE_KEY, JSON.stringify(data));

    // 渲染用户信息 & 配额
    const renderInfo = () => {
        const u = getUser();
        document.getElementById('userInfo').textContent = `${u.name} (${u.email})`;
        const quotaPct = Math.min(100, (u.usedQuota / u.totalQuota) * 100).toFixed(1);
        document.getElementById('quotaInfo').textContent = `已使用 ${u.usedQuota} MB / ${u.totalQuota} MB (${quotaPct}%)`;
        document.getElementById('quotaFill').style.width = quotaPct + '%';
    };

    // 密码强度校验
    const checkStrength = (pwd) => {
        const length = pwd.length >= 8;
        const upper = /[A-Z]/.test(pwd);
        const lower = /[a-z]/.test(pwd);
        const digit = /\d/.test(pwd);
        const special = /[!@#$%^&*(),.?":{}|<>]/.test(pwd);
        const score = [length, upper, lower, digit, special].filter(Boolean).length;
        return score; // 0-5
    };

    const showPwdMsg = (msg, color = '#d9534f') => {
        const el = document.getElementById('pwdMsg');
        el.textContent = msg;
        el.style.color = color;
    };

    // 绑定事件
    document.getElementById('changePwdBtn').addEventListener('click', () => {
        const oldPwd = document.getElementById('oldPwd').value.trim();
        const newPwd = document.getElementById('newPwd').value.trim();
        const confirmPwd = document.getElementById('confirmPwd').value.trim();

        const user = getUser();

        if (oldPwd !== user.password) {
            showPwdMsg('旧密码不正确');
            return;
        }
        if (newPwd !== confirmPwd) {
            showPwdMsg('两次输入的新密码不一致');
            return;
        }
        const strength = checkStrength(newPwd);
        if (strength < 4) {
            showPwdMsg('密码强度不足（至少8字符，包含大小写字母、数字和特殊字符）');
            return;
        }

        user.password = newPwd;
        setUser(user);
        showPwdMsg('密码修改成功', '#5cb85c');
        // 清空输入框
        document.getElementById('oldPwd').value = '';
        document.getElementById('newPwd').value = '';
        document.getElementById('confirmPwd').value = '';
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem(STORAGE_KEY);
        // 清除可能的 token（示例中未使用 token，仅演示）
        // 跳转回首页
        window.location.href = 'index.html';
    });

    // 初始渲染
    renderInfo();
})();
</script>
