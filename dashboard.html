<div class="toolbar" style="margin-bottom:16px;">
    <button class="btn" id="newModelBtn">新建模型</button>
    <a class="btn" href="library.html">素材库</a>
    <a class="btn" href="settings.html">账户设置</a>
</div>
<ul id="modelList" style="list-style:none;padding:0;margin:0;"></ul>
<script>
function uuid(){return 'm'+Date.now()+Math.random().toString(16).slice(2);}
function loadModels(){return JSON.parse(localStorage.getItem('models')||'{}');}
function saveModels(models){localStorage.setItem('models',JSON.stringify(models));}
function render(){
    const list=document.getElementById('modelList');
    const models=loadModels();
    list.innerHTML='';
    if(Object.keys(models).length===0){
        const empty=document.createElement('li');
        empty.style.textAlign='center';
        empty.style.padding='16px';
        empty.style.color='rgba(0,0,0,0.5)';
        empty.textContent='暂无模型，点击“新建模型”开始创作。';
        list.appendChild(empty);
        return;
    }
    for(const id in models){
        const m=models[id];
        const li=document.createElement('li');
        li.style.padding='8px';
        li.style.borderBottom='1px solid #ddd';
        li.innerHTML=`
            <div class="card" style="background-color:#fff;padding:16px;border-radius:8px;box-shadow:0 0 8px rgba(0,0,0,0.1);">
                <h3 style="margin:0 0 8px 0;">${m.name}</h3>
                <p style="margin:0 0 8px 0;font-size:0.9rem;color:rgba(0,0,0,0.5);">
                    创建于 ${new Date(m.created).toLocaleString()}
                </p>
                <div>
                    <a class="btn" href="editor.html?id=${id}" style="margin-right:8px;">编辑</a>
                    <button class="btn copyBtn" data-id="${id}" style="margin-right:8px;">复制</button>
                    <button class="btn deleteBtn" data-id="${id}">删除</button>
                </div>
            </div>
        `;
        list.appendChild(li);
    }
}
document.getElementById('newModelBtn').addEventListener('click',()=>{
    const name=prompt('请输入模型名称：','未命名模型');
    if(name===null) return;
    const id=uuid();
    const models=loadModels();
    models[id]={name,created:Date.now()};
    saveModels(models);
    render();
});
document.getElementById('modelList').addEventListener('click',e=>{
    if(e.target.classList.contains('deleteBtn')){
        const id=e.target.dataset.id;
        if(confirm('确定删除此模型及其所有版本？')){
            const models=loadModels();
            delete models[id];
            saveModels(models);
            render();
        }
    }
    if(e.target.classList.contains('copyBtn')){
        const id=e.target.dataset.id;
        const models=loadModels();
        const m=models[id];
        const newId=uuid();
        const copyName=m.name+' 副本';
        models[newId]={name:copyName,created:Date.now()};
        saveModels(models);
        render();
    }
});
render();
</script>
