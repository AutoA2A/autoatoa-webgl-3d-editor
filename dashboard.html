<body>
<div class="container">
    <div class="toolbar">
        <button class="btn" id="newModelBtn">新建模型</button>
        <a class="btn" href="library.html">素材库</a>
        <a class="btn" href="settings.html">账户设置</a>
    </div>
    <div id="modelList" class="container"></div>
</div>

<script>
// 简单的唯一 ID 生成
function uuid(){return 'm'+Date.now()+Math.random().toString(16).slice(2);}

// 本地存储读取/写入
function loadModels(){
    const raw = localStorage.getItem('models');
    return raw ? JSON.parse(raw) : {};
}
function saveModels(data){
    localStorage.setItem('models',JSON.stringify(data));
}

// 渲染模型列表
function render(){
    const models = loadModels();
    const list = document.getElementById('modelList');
    list.innerHTML='';
    if(Object.keys(models).length===0){
        const empty = document.createElement('p');
        empty.textContent='暂无模型，点击“新建模型”开始创作。';
        empty.style.padding='var(--gap)';
        empty.style.color='#555';
        list.appendChild(empty);
        return;
    }
    for(const id in models){
        const m = models[id];
        const card=document.createElement('div');
        card.className='card';
        card.innerHTML=`
            <h3 title="${m.name}">${m.name}</h3>
            <p style="margin:0 0 var(--gap) 0;color:#666;font-size:0.85rem;">
                创建于 ${new Date(m.created).toLocaleString()}
            </p>
            <div>
                <a class="btn" href="editor.html?id=${id}">编辑</a>
                <button class="btn copyBtn">复制</button>
                <button class="btn deleteBtn">删除</button>
            </div>
        `;
        card.querySelector('.copyBtn').onclick=()=>copyModel(id);
        card.querySelector('.deleteBtn').onclick=()=>deleteModel(id);
        list.appendChild(card);
    }
}

// 新建模型
document.getElementById('newModelBtn').onclick=()=>{
    const name=prompt('请输入模型名称：','新模型');
    if(!name) return;
    const id=uuid();
    const now=Date.now();
    const models=loadModels();
    models[id]={
        id,
        name,
        created:now,
        versions:[{id:uuid(),timestamp:now,data:'{cube:1}'}]
    };
    saveModels(models);
    render();
};

// 复制模型
function copyModel(srcId){
    const models=loadModels();
    const src=models[srcId];
    if(!src) return;
    const newId=uuid();
    const now=Date.now();
    const copy={
        id:newId,
        name:src.name+'_副本',
        created:now,
        versions:JSON.parse(JSON.stringify(src.versions))
    };
    models[newId]=copy;
    saveModels(models);
    render();
}

// 删除模型
function deleteModel(id){
    if(!confirm('确定删除此模型吗？此操作不可恢复。')) return;
    const models=loadModels();
    delete models[id];
    saveModels(models);
    render();
}

// 初始渲染
render();
</script>
