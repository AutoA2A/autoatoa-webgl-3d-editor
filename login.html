<body>
<div class="container">
    <div class="card">
        <h2 id="form-title">登录</h2>
        <form id="auth-form" novalidate>
            <div class="input-group">
                <label for="email">邮箱</label>
                <input type="email" id="email" required autocomplete="username">
            </div>
            <div class="input-group">
                <label for="password">密码</label>
                <input type="password" id="password" required autocomplete="current-password">
            </div>
            <div class="input-group" id="confirm-group" style="display:none;">
                <label for="confirm-password">确认密码</label>
                <input type="password" id="confirm-password" autocomplete="new-password">
            </div>
            <button type="submit" class="btn">登录</button>
        </form>
        <div class="toggle">
            没有账号？ <a id="switch-to-register">立即注册</a>
        </div>
    </div>
</div>

<script>
(function(){
    const form = document.getElementById('auth-form');
    const title = document.getElementById('form-title');
    const toggleDiv = document.querySelector('.toggle');
    const confirmGroup = document.getElementById('confirm-group');
    let mode = 'login'; // login or register

    function switchMode(){
        if(mode==='login'){
            mode='register';
            title.textContent='注册';
            form.querySelector('button').textContent='注册';
            confirmGroup.style.display='block';
            toggleDiv.innerHTML='已有账号？ <a id="switch-to-login">立即登录</a>';
        }else{
            mode='login';
            title.textContent='登录';
            form.querySelector('button').textContent='登录';
            confirmGroup.style.display='none';
            toggleDiv.innerHTML='没有账号？ <a id="switch-to-register">立即注册</a>';
        }
        attachToggleHandler();
    }

    function attachToggleHandler(){
        const link = toggleDiv.querySelector('a');
        link.onclick = switchMode;
    }

    attachToggleHandler();

    form.onsubmit = function(e){
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const pwd = document.getElementById('password').value;
        if(!email || !pwd){
            alert('请填写完整信息');
            return;
        }
        if(mode==='register'){
            const confirmPwd = document.getElementById('confirm-password').value;
            if(pwd !== confirmPwd){
                alert('两次输入的密码不一致');
                return;
            }
        }
        // 简单模拟后端：生成伪 token
        const token = btoa(email+':'+Date.now());
        try{
            localStorage.setItem('token', token);
            localStorage.setItem('userEmail', email);
        }catch(err){
            console.error('localStorage error', err);
        }
        // 跳转到仪表盘
        location.href='dashboard.html';
    };
})();
</script>
