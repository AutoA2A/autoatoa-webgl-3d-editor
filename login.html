<div class="container">
    <div class="card">
        <h2 id="form-title">登录</h2>
        <form id="auth-form" novalidate>
            <div class="input-group">
                <label for="email">邮箱</label>
                <input type="email" id="email" required autocomplete="username">
            </div>
            <div class="input-group">
                <label for="password">密码</label>
                <input type="password" id="password" required autocomplete="current-password">
            </div>
            <div class="input-group" id="confirm-group" style="display:none;">
                <label for="confirm-password">确认密码</label>
                <input type="password" id="confirm-password" autocomplete="new-password">
            </div>
            <button type="submit" class="btn">登录</button>
        </form>
        <div class="toggle">
            没有账号？ <a id="switch-to-register">立即注册</a>
        </div>
    </div>
</div>

<script>
(() => {
    const form = document.getElementById('auth-form');
    const title = document.getElementById('form-title');
    const toggleLink = document.getElementById('switch-to-register');
    const confirmGroup = document.getElementById('confirm-group');
    const btn = form.querySelector('button');
    let mode = 'login'; // login | register
    const TOKEN_KEY = 'auth_token';
    const USER_DB = 'user_db'; // simple user storage in localStorage

    // 简单的加密（仅演示，实际请使用安全后端）
    const hash = str => btoa(str);

    // 生成 token，包含过期时间（30 分钟）
    const generateToken = email => {
        const payload = {
            email,
            exp: Date.now() + 30 * 60 * 1000 // 30min
        };
        return btoa(JSON.stringify(payload));
    };

    // 验证 token 是否有效
    const isTokenValid = token => {
        try {
            const payload = JSON.parse(atob(token));
            return payload.exp > Date.now();
        } catch (e) {
            return false;
        }
    };

    // 保存 token 并跳转
    const loginSuccess = token => {
        localStorage.setItem(TOKEN_KEY, token);
        // 立即跳转
        location.href = 'dashboard.html';
    };

    // 注册或登录逻辑
    const handleSubmit = e => {
        e.preventDefault();
        const email = form.email.value.trim().toLowerCase();
        const pwd = form.password.value;
        const users = JSON.parse(localStorage.getItem(USER_DB) || '{}');

        if (mode === 'register') {
            const confirmPwd = form['confirm-password'].value;
            if (pwd !== confirmPwd) {
                alert('两次输入的密码不一致');
                return;
            }
            if (users[email]) {
                alert('该邮箱已注册，请直接登录');
                return;
            }
            users[email] = hash(pwd);
            localStorage.setItem(USER_DB, JSON.stringify(users));
            const token = generateToken(email);
            loginSuccess(token);
        } else {
            if (!users[email] || users[email] !== hash(pwd)) {
                alert('邮箱或密码错误');
                return;
            }
            const token = generateToken(email);
            loginSuccess(token);
        }
    };

    // 切换登录/注册模式
    const switchMode = () => {
        if (mode === 'login') {
            mode = 'register';
            title.textContent = '注册';
            btn.textContent = '注册';
            confirmGroup.style.display = 'block';
            toggleLink.textContent = '已有账号？立即登录';
        } else {
            mode = 'login';
            title.textContent = '登录';
            btn.textContent = '登录';
            confirmGroup.style.display = 'none';
            toggleLink.textContent = '没有账号？立即注册';
        }
    };

    // 自动续期：每次页面加载若 token 仍有效，延长 30 分钟
    const renewTokenIfNeeded = () => {
        const token = localStorage.getItem(TOKEN_KEY);
        if (token && isTokenValid(token)) {
            const payload = JSON.parse(atob(token));
            const newToken = generateToken(payload.email);
            localStorage.setItem(TOKEN_KEY, newToken);
        } else {
            localStorage.removeItem(TOKEN_KEY);
        }
    };

    // 初始化
    form.addEventListener('submit', handleSubmit);
    toggleLink.addEventListener('click', switchMode);
    renewTokenIfNeeded();
})();
</script>
