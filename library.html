<style>
    :root{
        --primary:#3498db;
        --bg:#f9f9f9;
        --card-bg:#fff;
        --text:#333;
        --muted:#555;
        --border:#ccc;
        --radius:4px;
    }
    body{background:var(--bg);}
    .library-content{padding:16px;}
    .controls{
        display:flex;
        flex-wrap:wrap;
        gap:12px;
        margin-bottom:16px;
        align-items:flex-end;
    }
    .controls input[type=text]{
        flex:1;
        min-width:200px;
        padding:8px;
        border:1px solid var(--border);
        border-radius:var(--radius);
    }
    .controls select{
        padding:8px;
        border:1px solid var(--border);
        border-radius:var(--radius);
    }
    .controls button{
        background:var(--primary);
        color:#fff;
        border:none;
        padding:8px 12px;
        border-radius:var(--radius);
        cursor:pointer;
    }
    .controls button:hover{background:#2980b9;}
    .controls input[type=file]{padding:8px;}
    .grid{
        display:grid;
        gap:16px;
    }
    @media (min-width:600px){.grid{grid-template-columns:repeat(2,1fr);}}
    @media (min-width:900px){.grid{grid-template-columns:repeat(3,1fr);}}
    .card{
        background:var(--card-bg);
        border-radius:8px;
        box-shadow:0 2px 6px rgba(0,0,0,0.1);
        overflow:hidden;
        display:flex;
        flex-direction:column;
    }
    .card img{
        width:100%;
        height:150px;
        object-fit:cover;
        background:#ddd;
    }
    .card .info{
        flex:1;
        padding:12px;
    }
    .card .info h3{
        margin:0 0 8px 0;
        font-size:1rem;
        color:var(--text);
    }
    .card .info p{
        margin:0;
        font-size:0.9rem;
        color:var(--muted);
    }
    .card button{
        margin:12px;
        padding:8px 12px;
        background:var(--primary);
        color:#fff;
        border:none;
        border-radius:var(--radius);
        cursor:pointer;
    }
    .card button:hover{background:#2980b9;}
    .pagination{
        display:flex;
        justify-content:center;
        gap:8px;
        margin-top:16px;
    }
    .pagination button{
        padding:8px 12px;
        background:var(--primary);
        color:#fff;
        border:none;
        border-radius:var(--radius);
        cursor:pointer;
    }
    .pagination button[disabled]{background:#ccc;cursor:not-allowed;}
    .pagination button:hover:not([disabled]){background:#2980b9;}
</style>

<script>
    // 工具函数：将SVG转为data URI
    function svgToDataUri(svg){
        return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
    }

    // 初始资源（可被localStorage持久化）
    function getInitialAssets(){
        return [
            {id:'m1',type:'model',name:'立方体',preview:svgToDataUri('<svg width="120" height="80" viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg"><rect width="120" height="80" fill="'+var(--primary)+'"/></svg>')},
            {id:'m2',type:'model',name:'球体',preview:svgToDataUri('<svg width="120" height="80" viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg"><circle cx="60" cy="40" r="30" fill="'+var(--primary)+'"/></svg>')},
            {id:'t1',type:'texture',name:'棋盘纹理',preview:svgToDataUri('<svg width="120" height="80" viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg"><rect width="60" height="40" fill="#fff"/><rect x="60" y="0" width="60" height="40" fill="#000"/><rect x="0" y="40" width="60" height="40" fill="#000"/><rect x="60" y="40" width="60" height="40" fill="#fff"/></svg>')},
            {id:'t2',type:'texture',name:'渐变纹理',preview:svgToDataUri('<svg width="120" height="80" viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="'+var(--primary)+'"/><stop offset="100%" stop-color="#fff"/></linearGradient></defs><rect width="120" height="80" fill="url(%23g)"/></svg>')},
            {id:'ma1',type:'material',name:'金属材质',preview:svgToDataUri('<svg width="120" height="80" viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg"><circle cx="60" cy="40" r="30" fill="#b0b0b0"/></svg>')},
            {id:'ma2',type:'material',name:'橡胶材质',preview:svgToDataUri('<svg width="120" height="80" viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg"><circle cx="60" cy="40" r="30" fill="#ff6600"/></svg>')}
        ];
    }

    // 从localStorage读取或初始化资源列表
    let assets = JSON.parse(localStorage.getItem('libraryAssets')||'null');
    if(!assets) { assets = getInitialAssets(); localStorage.setItem('libraryAssets',JSON.stringify(assets)); }

    const PAGE_SIZE = 9;
    let currentPage = 1;
    let filtered = [];

    function filterAssets(){
        const term = document.getElementById('searchInput').value.toLowerCase();
        const cat = document.getElementById('categorySelect').value;
        filtered = assets.filter(a=>{
            const matchesTerm = a.name.toLowerCase().includes(term);
            const matchesCat = cat==='all' || a.type===cat;
            return matchesTerm && matchesCat;
        });
        currentPage = 1;
        renderGrid();
        renderPagination();
    }

    function renderGrid(){
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        const start = (currentPage-1)*PAGE_SIZE;
        const end = start+PAGE_SIZE;
        const pageAssets = filtered.slice(start,end);
        if(pageAssets.length===0){
            grid.innerHTML = '<p style="text-align:center;color:#666;">暂无素材</p>';
            return;
        }
        pageAssets.forEach(a=>{
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${a.preview}" alt="${a.name}">
                <div class="info">
                    <h3>${a.name}</h3>
                    <p>${a.type==='model'?'模型':a.type==='texture'?'纹理':'材质'}</p>
                </div>
                <button>使用</button>
            `;
            card.querySelector('button').onclick = ()=>useAsset(a);
            grid.appendChild(card);
        });
    }

    function renderPagination(){
        const pag = document.getElementById('pagination');
        pag.innerHTML = '';
        const pageCount = Math.max(1,Math.ceil(filtered.length/PAGE_SIZE));
        for(let i=1;i<=pageCount;i++){
            const btn = document.createElement('button');
            btn.textContent = i;
            btn.disabled = (i===currentPage);
            btn.onclick = ()=>{ currentPage=i; renderGrid(); renderPagination(); };
            pag.appendChild(btn);
        }
    }

    function useAsset(asset){
        // 尝试给已打开的编辑器发消息
        if(window.opener && !window.opener.closed){
            window.opener.postMessage({type:'addAsset',asset:asset},'*');
            return;
        }
        // 否则存入localStorage并跳转编辑器
        localStorage.setItem('selectedAsset',JSON.stringify(asset));
        window.location.href = 'editor.html';
    }

    // 批量导入
    document.getElementById('importBtn').onclick = ()=>{
        document.getElementById('fileInput').click();
    };
    document.getElementById('fileInput').onchange = e=>{
        const files = e.target.files;
        if(!files.length) return;
        let added = 0;
        for(const f of files){
            if(!f.type.startsWith('image/') && !f.name.endsWith('.gltf') && !f.name.endsWith('.glb') && !f.name.endsWith('.obj')) continue;
            const reader = new FileReader();
            reader.onload = ev=>{
                const preview = ev.target.result; // data URL
                const newAsset = {
                    id: Date.now()+added,
                    type:'model',
                    name: f.name,
                    preview: preview
                };
                assets.push(newAsset);
                added++;
            };
            reader.readAsDataURL(f);
        }
        if(added>0){
            localStorage.setItem('libraryAssets',JSON.stringify(assets));
            filterAssets(); // 刷新列表
        }
        e.target.value = ''; // reset
    };

    // 搜索按钮
    document.getElementById('searchBtn').onclick = filterAssets;
    // 实时搜索（回车）
    document.getElementById('searchInput').onkeypress = e=>{
        if(e.key==='Enter') filterAssets();
    };
    // 分类变更
    document.getElementById('categorySelect').onchange = filterAssets;

    // 初次渲染
    filterAssets();
</script>
